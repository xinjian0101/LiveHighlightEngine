name: Feature request
description: Propose a scoring, adapter, review, export, or integration improvement
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Describe the workflow problem before proposing an implementation. New behavior must remain local-first, explainable, and reviewable.
  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Signal adapter
        - Event schema
        - Scoring profile
        - Interval merging
        - Ranking and review
        - Export format
        - ClipBench integration
        - FlowFFmpeg integration
        - Developer experience
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user workflow is currently difficult or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe inputs, outputs, configuration, and expected review behavior.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Synthetic example
      render: json
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: List measurable conditions that would make the feature complete.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project-boundary checks
      options:
        - label: The proposal does not require hidden media upload.
          required: true
        - label: The proposal preserves human review before publication.
          required: true
        - label: I considered backward compatibility and benchmark impact.
          required: true
